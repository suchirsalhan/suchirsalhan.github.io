short_bio: >-
Hello! I’m Suchir Salhan, a fourth-year MEng Computer Science student at Gonville and Caius College, the University of Cambridge.

I research Machine Learning and Natural Language Processing. I am interested in engineering more data-efficient “foundation models” in Machine Learning (particularly Large Language Models and Vision-Language Models), and multi-agent systems. I have a broad interest in tackling the fundamental issues in Machine Learning, such as model compositionality and explainable AI.

I have worked with several researchers in the Department of Computer Science & Technology, particularly in the Natural Language and Information Processing Group (NLIP).

I also maintain strong links with the Department of Theoretical and Applied Linguistics where I have worked with theoretical syntacticians, typologists and phonologists and completed an extended project led by Prof Nigel Collier, the director of the Language Technology Laboratory.
